                            { id: 'f2', text: '真正的朋友不應該幫忙隱瞞錯誤，這樣反而會害他一錯再錯。', type: 'evidence' },
                            { id: 'f3', text: '老師有豐富的經驗，能用正確的方法引導朋友認識錯誤並改正。', type: 'evidence' },
                            { id: 'f4', text: '如果朋友做的是危險或欺負別人的事，及時報告老師才能保護所有人。', type: 'evidence' },
                            { id: 'f5', text: '因此，告訴老師不是背叛，而是幫助好朋友走回正軌的最佳選擇。', type: 'conclusion' }
                        ]
                    }
                ]
            }
        };

        // 打亂陣列的輔助函數
        const shuffleArray = (array) => {
          const newArray = [...array];
          for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
          }
          return newArray;
        };

        // ===== 畫筆塗鴉層元件 =====
        function DrawingOverlay({ isEnabled, color, lineWidth, onClear }) {
          const canvasRef = useRef(null);
          const [isDrawing, setIsDrawing] = useState(false);
          const [ctx, setCtx] = useState(null);

          // 初始化畫布與處理視窗縮放
          useEffect(() => {
            const canvas = canvasRef.current;
            const resizeCanvas = () => {
              const tempCanvas = document.createElement('canvas');
              const tempCtx = tempCanvas.getContext('2d');
              tempCanvas.width = canvas.width;
              tempCanvas.height = canvas.height;
              tempCtx.drawImage(canvas, 0, 0);

              canvas.width = window.innerWidth;
              canvas.height = window.innerHeight;

              const context = canvas.getContext('2d');
              context.lineCap = 'round';
              context.lineJoin = 'round';
              context.drawImage(tempCanvas, 0, 0);
              setCtx(context);
            };

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const context = canvas.getContext('2d');
            context.lineCap = 'round';
            context.lineJoin = 'round';
            setCtx(context);

            window.addEventListener('resize', resizeCanvas);
            return () => window.removeEventListener('resize', resizeCanvas);
          }, []);

          // 綁定外部清除功能
          useEffect(() => {
            if (onClear) {
              onClear.current = () => {
                if (ctx && canvasRef.current) {
                  ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                }
              };
            }
          }, [ctx, onClear]);

          const getCoordinates = (e) => {
            if (e.touches && e.touches.length > 0) {
              return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
          };

          const startDrawing = (e) => {
            if (!isEnabled) return;
            const { x, y } = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            setIsDrawing(true);
          };

          const draw = (e) => {
            if (!isDrawing || !isEnabled) return;
            const { x, y } = getCoordinates(e);
            ctx.lineTo(x, y);
            ctx.stroke();
          };

          const stopDrawing = () => {
            if (!isDrawing || !isEnabled) return;
            ctx.closePath();
            setIsDrawing(false);
          };

          return (
            <canvas
              ref={canvasRef}
              className={`fixed inset-0 z-[50] ${isEnabled ? 'cursor-crosshair pointer-events-auto touch-none' : 'pointer-events-none'}`}
              onMouseDown={startDrawing}
              onMouseMove={draw}
              onMouseUp={stopDrawing}
              onMouseOut={stopDrawing}
              onTouchStart={startDrawing}
              onTouchMove={draw}
              onTouchEnd={stopDrawing}
            />
          );
        }

        // ===== 主應用程式 =====

          const clearCanvasRef = useRef(null);

              ...item,
              category: 'pool', // 初始都在積木池
              status: 'idle'    // idle, correct, wrong
            }));
            setBlocks(shuffleArray(initialBlocks));
            setCurrentCatKey(catKey);
            setCurrentTopicIdx(topicIdx);
            setGameState('playing');
            setCheckResult(null);
            setSelectedBlockId(null);
            setShowReward(false); // 重置獎勵畫面
          };

          // 初始載入
          useEffect(() => {
            initGame('social', 0); 
          }, []);

          // 切換大類別
          const handleCategorySwitch = (catKey) => {
            if (currentCatKey !== catKey) {
                initGame(catKey, 0); // 切換類別時，預設選取該類別的第一個主題
            }
          };

          // 處理拖曳開始
          const handleDragStart = (e, id) => {
            e.dataTransfer.setData('blockId', id);
            setSelectedBlockId(id); // 為了視覺回饋
          };

          // 處理放置
          const handleDrop = (e, targetCategory) => {
            e.preventDefault();
            const blockId = e.dataTransfer.getData('blockId');
            moveBlock(blockId, targetCategory);
          };

          const handleDragOver = (e) => {
            e.preventDefault();
          };

          // 移動積木的共用邏輯 (支援拖曳與點擊)
          const moveBlock = (blockId, targetCategory) => {
            if (!blockId) return;
            
            setBlocks(prev => prev.map(block => {
              if (block.id === blockId) {
                return { ...block, category: targetCategory, status: 'idle' };
              }
              return block;
            }));
            setSelectedBlockId(null);
            setGameState('playing');
          };

          // 處理點擊 (支援平板/無滑鼠拖曳)
          const handleBlockClick = (id) => {
            if (selectedBlockId === id) {
              setSelectedBlockId(null); // 取消選取
            } else {
              setSelectedBlockId(id);
            }
          };

          const handleZoneClick = (category) => {
            if (selectedBlockId) {
              moveBlock(selectedBlockId, category);
            }
          };

          // 檢查答案
          const checkAnswers = () => {
            let allCorrect = true;
            let anyUnplaced = false;

            const newBlocks = blocks.map(block => {
              if (block.category === 'pool') {
                anyUnplaced = true;
                return { ...block, status: 'idle' };
              }
              const isCorrect = block.category === block.type;
              if (!isCorrect) allCorrect = false;
              return { ...block, status: isCorrect ? 'correct' : 'wrong' };
            });

            setBlocks(newBlocks);

            if (anyUnplaced) {
              setCheckResult('哎呀，還有積木沒有放進去喔！');
              setGameState('checking');
            } else if (allCorrect) {
              setGameState('success');
              setShowReward(true);
              setCheckResult(null);
              
              // 記錄已完成的關卡ID
              setCompletedTopics(prev => {
                const topicId = activeCategory.topics[currentTopicIdx].id;
                if (!prev.includes(topicId)) {
                  return [...prev, topicId];
                }
                return prev;
              });

              // 3秒後自動關閉獎勵畫面，讓老師可以檢討內容
              const newTimerId = setTimeout(() => {
                setShowReward(false);
              }, 3000);
              setTimerId(newTimerId);

            } else {
              setCheckResult('有些積木放錯位置了，紅色框框的需要換一下喔！');
              setGameState('checking');
            }
          };

          // 算各區域目前的數量
          const getZoneBlocks = (category) => blocks.filter(b => b.category === category);

          // 決定主題顏色的 Tailwind Class
          const btnActiveColor = activeCategory.themeColor === 'orange' 
            ? 'bg-orange-500 hover:bg-orange-600' 
            : activeCategory.themeColor === 'teal' 
              ? 'bg-teal-500 hover:bg-teal-600' 
              : 'bg-indigo-600 hover:bg-indigo-700';
              
          const titleColor = activeCategory.themeColor === 'orange' 
            ? 'text-orange-600' 
            : activeCategory.themeColor === 'teal'
              ? 'text-teal-600'
              : 'text-indigo-700';
              
          const borderHighlight = activeCategory.themeColor === 'orange' 
            ? 'border-orange-400 bg-orange-50/30'

              : 'border-indigo-400 bg-indigo-50/30';

          return (
            <div className="min-h-screen p-4 md:p-6 lg:p-8 relative">
              
              {/* 畫筆塗鴉層 (放在背景之上，UI控制鈕之下) */}
              <DrawingOverlay

              />

              <div className="max-w-7xl mx-auto">

                    <button 
                        onClick={() => handleCategorySwitch('social')}

                        <span className="text-xl lg:text-2xl">👼</span> 禮貌小天使 <span className="text-xs lg:text-sm font-normal">(人際規矩)</span>
                    </button>

                            : 'bg-white text-orange-600 border-orange-200 hover:bg-orange-50'}`}

                    </button>

                            ${currentCatKey === 'senior' 
                            ? 'bg-indigo-600 text-white border-indigo-700 scale-105' 
                            : 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50'}`}
                    >

                </div>

                {/* 標題與目前類別的主題選擇 */}

                        </p>

                    {/* 論點區 */}
                    <DropZone

                      onDrop={handleDrop}

                      blocks={getZoneBlocks('conclusion')}

                      themeColor={activeCategory.themeColor}
                      isLocked={gameState === 'success'}

                      onDrop={handleDrop}

                    <div className="flex flex-col sm:flex-row items-center justify-between gap-4 mt-2">

                      {gameState !== 'success' ? (
                        <button 
                          onClick={checkAnswers}
                          className="w-full sm:w-auto px-8 lg:px-10 py-3 lg:py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold text-lg lg:text-xl shadow-lg transition-all hover:-translate-y-1"

                          排好了！檢查答案

                            onClick={() => initGame(currentCatKey, currentTopicIdx)}

                          >

                            onClick={() => initGame(currentCatKey, (currentTopicIdx + 1) % activeCategory.topics.length)}
                            className={`flex-1 sm:flex-none px-6 py-3 lg:py-4 ${btnActiveColor} text-white rounded-xl font-bold text-lg shadow-lg transition-all hover:-translate-y-1`}

                  </div>
                </div>
              </div>

              {/* 畫筆控制工具列 (固定在右下角) */}
              <div className="fixed bottom-6 right-6 z-[100] flex flex-col items-end gap-3">
                  {isDrawMode && (
                      <div className="bg-white p-4 rounded-2xl shadow-2xl border-2 border-slate-200 flex flex-col gap-4">
                          <div className="flex gap-2">
                              {['#ef4444', '#3b82f6', '#22c55e', '#f59e0b', '#1e293b'].map(c => (
                                  <button
                                      key={c}
                                      onClick={() => setPenColor(c)}
                                      className={`w-8 h-8 rounded-full border-2 ${penColor === c ? 'border-slate-800 scale-125' : 'border-transparent shadow-sm'}`}
                                      style={{ backgroundColor: c }}
                                  />
                              ))}
                          </div>
                          <div className="flex items-center justify-between gap-3 border-t pt-3">
                              <div className="flex items-center gap-2">
                                  <span className="text-xs font-bold text-slate-500">粗細</span>
                                  <input
                                      type="range"
                                      min="2" max="16"
                                      value={penWidth}
                                      onChange={e => setPenWidth(Number(e.target.value))}
                                      className="w-20"
                                  />
                              </div>
                              <button
                                  onClick={() => clearCanvasRef.current && clearCanvasRef.current()}
                                  className="flex items-center gap-1 px-3 py-1.5 text-sm font-bold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors"
                              >
                                  <TrashIcon /> 清除
                              </button>
                          </div>
                      </div>
                  )}
                  <button
                      onClick={() => setIsDrawMode(!isDrawMode)}
                      className={`flex items-center gap-2 px-6 py-3 rounded-full font-bold text-lg shadow-xl transition-all ${isDrawMode ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-yellow-400 text-slate-800 hover:bg-yellow-300 border-2 border-yellow-500'}`}
                  >
                      {isDrawMode ? <><CloseIcon /> 關閉畫筆</> : <><PenIcon /> 開啟畫筆</>}
                  </button>
              </div>

            </div>
          );
        }

        // 可重複使用的拖曳區域元件
        function DropZone({ 
          title, description, category, colorClass, headerColorClass, 
          blocks, selectedBlockId, themeColor, isLocked, onDragOver, onDrop, onClick, 
          onDragStart, onBlockClick 
        }) {
          const ringColor = themeColor === 'orange' ? 'ring-orange-300' : themeColor === 'teal' ? 'ring-teal-300' : 'ring-indigo-300';
          return (
            <div 
              className={`rounded-2xl border-2 overflow-hidden shadow-sm transition-colors min-h-[150px] lg:min-h-[180px] flex flex-col relative z-10
                ${colorClass}
                ${selectedBlockId && !isLocked ? `ring-4 ${ringColor} ring-opacity-50 cursor-pointer` : ''}
              `}
              onDragOver={!isLocked ? onDragOver : undefined}
              onDrop={!isLocked ? (e) => onDrop(e, category) : undefined}
              onClick={!isLocked ? () => onClick(category) : undefined}
            >
              <div className={`${headerColorClass} text-white px-4 py-2 lg:px-6 lg:py-3 font-bold flex flex-col sm:flex-row sm:items-center sm:justify-between`}>
                <span className="text-lg lg:text-2xl tracking-wide">{title}</span>
                <span className="text-sm lg:text-base opacity-95 font-normal mt-1 sm:mt-0">{description}</span>
              </div>
              <div className="p-3 lg:p-5 flex-1 flex flex-col gap-3 lg:gap-4 min-h-[90px]">
                {blocks.length === 0 ? (
                  <div className="flex-1 flex items-center justify-center text-slate-400/80 font-bold border-2 border-dashed border-current rounded-xl lg:text-xl">
                    放這裡
                  </div>
                ) : (
                  blocks.map(block => (
                    <BlockCard 
                      key={block.id} 
                      block={block} 
                      isSelected={selectedBlockId === block.id}
                      themeColor={themeColor}
                      isLocked={isLocked}
                      onDragStart={onDragStart}
                      onClick={onBlockClick}
                    />
                  ))
                )}
              </div>
            </div>
          );
        }

        // 單一積木元件
        function BlockCard({ block, isSelected, themeColor, isLocked, onDragStart, onClick }) {
          let statusClasses = "border-slate-300 bg-white text-slate-800";
          
          if (!isLocked) {
              statusClasses += " hover:shadow-md";
              statusClasses += themeColor === 'orange' ? ' hover:border-orange-400' : themeColor === 'teal' ? ' hover:border-teal-400' : ' hover:border-indigo-400';
          }
          
          let icon = <GripIcon />;

          if (isSelected && !isLocked) {
            if (themeColor === 'orange') {
                statusClasses = "border-orange-500 bg-orange-50 text-orange-900 shadow-md ring-2 ring-orange-200 scale-[1.02]";
            } else if (themeColor === 'teal') {
                statusClasses = "border-teal-500 bg-teal-50 text-teal-900 shadow-md ring-2 ring-teal-200 scale-[1.02]";
            } else {
                statusClasses = "border-indigo-500 bg-indigo-50 text-indigo-900 shadow-md ring-2 ring-indigo-200 scale-[1.02]";
            }
          } else if (block.status === 'correct') {
            statusClasses = "border-green-500 bg-green-50 text-green-900 shadow-sm";
            icon = <CheckIcon />;
          } else if (block.status === 'wrong') {
            statusClasses = "border-red-400 bg-red-50 text-red-900 shadow-sm animate-pulse";
            icon = <XIcon />;
          }

          return (
            <div
              draggable={!isLocked}
              onDragStart={!isLocked ? (e) => {
                e.stopPropagation();
                onDragStart(e, block.id);
              } : undefined}
              onClick={!isLocked ? (e) => {
                e.stopPropagation();
                onClick(block.id);
              } : undefined}
              className={`p-3 md:p-4 lg:p-5 rounded-xl border-2 ${!isLocked ? 'cursor-pointer' : 'cursor-default'} transition-all duration-200 flex items-center gap-3 lg:gap-4 select-none ${statusClasses} relative z-10`}
            >
              <div className="mt-0.5 lg:mt-0 flex-shrink-0">{icon}</div>
              <div className="font-bold text-lg lg:text-2xl leading-snug flex-1 tracking-wide">
                {block.text}
              </div>
            </div>
          );
        }

        // 啟動應用程式
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
